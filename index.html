
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Panel - Tournament App</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .page { display: none; } .page.active { display: block; }
        .modal { display: none; } .modal.active { display: flex; } 
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: #fff7ed; } ::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 5px;}
        .text-gradient { background-clip: text; -webkit-background-clip: text; color: transparent; background-image: linear-gradient(to right, #dc2626, #fbbf24); }
        .admin-nav-item { transition: all 0.3s ease; }

        /* Custom switch toggle for locked status */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            -webkit-transition: .4s;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            -webkit-transition: .4s;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #ef4444; 
        }

        input:focus + .slider {
            box-shadow: 0 0 1px #ef4444;
        }

        input:checked + .slider:before {
            -webkit-transform: translateX(20px);
            -ms-transform: translateX(20px);
            transform: translateX(20px);
        }
        /* Lock reason textarea styling */
        #edit-user-lock-reason-group {
            display: none; 
        }
    </style>
</head>
<body class="bg-orange-50 text-gray-800 font-sans">

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());

       const firebaseConfig = {
            apiKey: "AIzaSyDR2OugzoVNnKN6OUKsPxC9ajldlhanteE",
            authDomain: "tournament-af6dd.firebaseapp.com",
            projectId: "tournament-af6dd",
            storageBucket: "tournament-af6dd.firebasestorage.app",
            messagingSenderId: "726964405659",
            appId: "1:726964405659:web:d03f72c2d6f8721bc98d3e",
            measurementId: "G-GK0JNQ44N7"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentAdminData = null;
        let currentTournamentId = null;
        let allUsersData = {}; // GLOBAL: Stores all users for client-side filtering

        function toggleModal(modalId, show) { document.getElementById(modalId).classList.toggle('active', show); }

        function navigateTo(pageId, data = null) {
            document.getElementById('initial-loader').style.display = 'none';
            if (pageId === 'adminManageTournamentPage' && data) currentTournamentId = data.tournamentId;
            
            // Store referrer UID for adminViewReferredUsersPage
            if (pageId === 'adminViewReferredUsersPage' && data) {
                localStorage.setItem('adminReferrerUid', data.referrerUid);
            } else if (pageId !== 'adminViewReferredUsersPage') {
                localStorage.removeItem('adminReferrerUid');
            }

            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const targetPage = document.getElementById(pageId);
            if (targetPage) {
                targetPage.classList.add('active');
                loadPageContent(pageId);
            }
            const nav = document.getElementById('admin-bottom-nav');
            if(nav) nav.style.display = auth.currentUser ? 'block' : 'none'; 
            
            document.querySelectorAll('.admin-nav-item').forEach(item => {
                const isActive = item.getAttribute('onclick').includes(pageId);
                item.className = 'admin-nav-item text-center transition-all duration-300';
                if (isActive) {
                    item.classList.add('text-white', 'scale-125', '-translate-y-1', 'font-bold', 'drop-shadow-md');
                } else {
                    item.classList.add('text-white/60', 'scale-100');
                }
            });
            window.scrollTo(0, 0);
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `fixed top-5 right-5 text-white py-2 px-4 rounded-lg shadow-lg ${isError ? 'bg-gradient-to-r from-red-600 to-red-400' : 'bg-gradient-to-r from-green-500 to-green-600'}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function formatCurrency(amount) {
            return `PKR ${new Intl.NumberFormat('en-PK', { minimumFractionDigits: 0 }).format(amount)}`;
        }

        auth.onAuthStateChanged(async user => {
            document.getElementById('initial-loader').style.display = 'none'; 
            if (user) {
                const adminSnap = await db.ref('admins/' + user.uid).once('value');
                if (adminSnap.exists() && adminSnap.val() === true) {
                    currentAdminData = { uid: user.uid, email: user.email };
                    navigateTo('adminDashboardPage');
                    document.getElementById('admin-bottom-nav').style.display = 'block';
                } else {
                    showToast("Access Denied: You are not an administrator.", true);
                    auth.signOut();
                    navigateTo('adminLoginPage');
                    document.getElementById('admin-bottom-nav').style.display = 'none'; 
                }
            } else {
                currentAdminData = null;
                navigateTo('adminLoginPage');
                document.getElementById('admin-bottom-nav').style.display = 'none';
            }
        });
        
        function loadPageContent(pageId) {
            const pageContainer = document.getElementById(pageId);
            if (!pageContainer) return;
            switch (pageId) {
                case 'adminLoginPage': renderAdminLoginPage(pageContainer); break;
                case 'adminDashboardPage': renderAdminDashboardPage(pageContainer); break;
                case 'adminGamesPage': renderAdminGamesPage(pageContainer); break;
                case 'adminTournamentPage': renderAdminTournamentPage(pageContainer); break;
                case 'adminManageTournamentPage': renderAdminManageTournamentPage(pageContainer); break;
                case 'adminUsersPage': renderAdminUsersPage(pageContainer); break; 
                case 'adminSettingsPage': renderAdminSettingsPage(pageContainer); break; 
                case 'adminManageUsersPage': renderAdminManageUsersPage(pageContainer); break; 
                case 'adminAppContentPage': renderAdminAppContentPage(pageContainer); break; 
                case 'adminContactMessagesPage': renderAdminContactMessagesPage(pageContainer); break; 
                case 'adminReferralsPage': renderAdminReferralsPage(pageContainer); break; 
                case 'adminViewReferredUsersPage': renderAdminViewReferredUsersPage(pageContainer); break; 
                // NEW PAGES FOR DATABASE NODES
                case 'adminAppSettingsPage': renderAdminAppSettingsPage(pageContainer); break;
                case 'adminLiveGamePage': renderAdminLiveGamePage(pageContainer); break;
                case 'adminGameLogsPage': renderAdminGameLogsPage(pageContainer); break;
                case 'adminTransactionsPage': renderAdminTransactionsPage(pageContainer); break;
                case 'adminVideoContentPage': renderAdminVideoContentPage(pageContainer); break;
                case 'adminVideoWatchLogsPage': renderAdminVideoWatchLogsPage(pageContainer); break;
                case 'adminWorkerEarningsPage': renderAdminWorkerEarningsPage(pageContainer); break;
            }
        }
        
        function renderAdminLoginPage(container) {
            container.innerHTML = `
                <div class="p-6 h-screen flex flex-col justify-center bg-orange-50">
                    <h1 class="text-4xl font-black text-center mb-2 text-gradient">Admin Panel</h1>
                    <div class="bg-white p-6 rounded-lg shadow-lg border border-orange-200">
                        <form id="adminLoginForm" class="space-y-4">
                            <input type="email" id="adminLoginEmail" placeholder="Email" class="w-full p-3 bg-gray-50 rounded border border-gray-300 focus:border-red-500" required>
                            <input type="password" id="adminLoginPassword" placeholder="Password" class="w-full p-3 bg-gray-50 rounded border border-gray-300 focus:border-red-500" required>
                            <button type="submit" class="w-full text-white bg-gradient-to-r from-red-600 to-yellow-500 hover:from-red-700 hover:to-yellow-600 p-3 rounded font-bold shadow-md">Login</button>
                        </form>
                    </div>
                </div>`;
            document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
                e.preventDefault();
                auth.signInWithEmailAndPassword(e.target.adminLoginEmail.value, e.target.adminLoginPassword.value).catch(err => showToast(err.message, true));
            });
        }

        async function renderAdminDashboardPage(container) {
            container.innerHTML = `<div class="p-4 space-y-6 bg-orange-50 min-h-screen">

        async function approveDeposit(userId, depositId, amount) {
            if (confirm(`Approve deposit of ${formatCurrency(amount)} for this user?`)) {
                const userWalletRef = db.ref(`users/${userId}/wallet_balance`);
                userWalletRef.transaction((currentBalance) => {
                    return (currentBalance || 0) + amount;
                }, async (error, committed, snapshot) => {
                    if (error) {
                        showToast('Deposit approval failed: ' + error.message, true);
                    } else if (committed) {
                        await db.ref(`pending_deposits/${userId}/${depositId}`).update({ status: 'approved', approved_at: new Date().toISOString() });
                        await db.ref(`transactions/${userId}`).push({
                            amount: amount,
                            type: 'credit',
                            description: 'EasyPaisa/JazzCash Deposit (Approved)',
                            created_at: new Date().toISOString()
                        });
                        showToast('Deposit approved and wallet updated!');
                    }
                });
            }
        }

        async function rejectDeposit(userId, depositId) {
            if (confirm('Reject this deposit request?')) {
                await db.ref(`pending_deposits/${userId}/${depositId}`).update({ status: 'rejected', rejected_at: new Date().toISOString() });
                showToast('Deposit request rejected.');
            }
        }

        async function completeWithdrawal(userId, withdrawalId, transactionId) {
            if (confirm('Mark this withdrawal as completed (money sent)?')) {
                const updates = {};
                updates[`/pending_withdrawals/${userId}/${withdrawalId}/status`] = 'completed';
                updates[`/pending_withdrawals/${userId}/${withdrawalId}/completed_at`] = new Date().toISOString();
                // Note: The transaction for the withdrawal debit is created on the user side when they request it.
                // We just update its status here.
                updates[`/transactions/${userId}/${transactionId}/status`] = 'completed';
                updates[`/transactions/${userId}/${transactionId}/completed_at`] = new Date().toISOString();
                updates[`/transactions/${userId}/${transactionId}/description`] = 'Withdrawal Completed'; 

                await db.ref().update(updates);
                showToast('Withdrawal marked as completed!');
            }
        }

        async function cancelWithdrawal(userId, withdrawalId, transactionId, amount) {
            if (confirm('Cancel this withdrawal and refund the money to the user?')) {
                const userWalletRef = db.ref(`users/${userId}/wallet_balance`);
                userWalletRef.transaction((currentBalance) => {
                    return (currentBalance || 0) + amount; // Refund the amount
                }, async (error, committed, snapshot) => {
                    if (error) {
                        showToast('Withdrawal cancellation failed: ' + error.message, true);
                    } else if (committed) {
                        const updates = {};
                        updates[`/pending_withdrawals/${userId}/${withdrawalId}/status`] = 'cancelled';
                        updates[`/pending_withdrawals/${userId}/${withdrawalId}/cancelled_at`] = new Date().toISOString();
                        // Update the transaction status and description
                        updates[`/transactions/${userId}/${transactionId}/status`] = 'cancelled';
                        updates[`/transactions/${userId}/${transactionId}/cancelled_at`] = new Date().toISOString();
                        updates[`/transactions/${userId}/${transactionId}/description`] = `Withdrawal Cancelled (Refunded ${formatCurrency(amount)})`;

                        await db.ref().update(updates);
                        showToast('Withdrawal cancelled and money refunded to user.');
                    }
                });
            }
        }

        // Helper function to escape strings for JavaScript in HTML attribute context
        function escapeJsStringForHtmlAttribute(s) {
            const str = String(s || '');
            return str.replace(/\\/g, '\\\\')
                      .replace(/'/g, '\\\'')
                      .replace(/"/g, '&quot;')
                      .replace(/\n/g, '\\n')
                      .replace(/\r/g, '\\r');
        }

        function filterUsersByEmail() {
            const listEl = document.getElementById('admin-users-list');
            const searchInput = document.getElementById('user-search-input');
            
            // Ensure search input and users list element exist
            if (!searchInput || !listEl) {
                console.error("Search input or user list element not found.");
                return;
            }

            const searchTerm = searchInput.value.toLowerCase().trim();
            let usersHtml = '';
            let userCount = 0;

            if (Object.keys(allUsersData).length === 0) {
                listEl.innerHTML = `<p class="text-center text-gray-400 italic">No users found in database or data could not be retrieved.</p>`;
                return;
            }

            // Convert allUsersData object to an array for sorting
            const usersArray = Object.keys(allUsersData).map(uid => ({ uid, ...allUsersData[uid] }));

            // Sort users by created_at (newest first)
            usersArray.sort((a, b) => {
                const dateA = a.created_at ? new Date(a.created_at).getTime() : 0;
                const dateB = b.created_at ? new Date(b.created_at).getTime() : 0;
                return dateB - dateA; // Newest first
            });

            for (const user of usersArray) { // Iterate through the sorted array
                // Defensive check: Ensure basic user properties exist before trying to display
                if (user && user.username && user.email) {
                    const userEmailLower = user.email.toLowerCase();
                    
                    // Filter logic: Check if the user's email contains the search term
                    if (userEmailLower.includes(searchTerm)) {
                        const lockStatusColor = user.locked ? 'text-red-600' : 'text-green-600';
                        const lockStatusText = user.locked ? 'Locked' : 'Active';
                        const createdAtDate = user.created_at ? new Date(user.created_at).toLocaleString() : 'N/A';


                        usersHtml += `
                            <div class="bg-white p-3 rounded-lg shadow-sm border border-yellow-100 flex items-center justify-between">
                                <div>
                                    <p class="font-bold text-gray-800">${escapeJsStringForHtmlAttribute(user.username)}</p>
                                    <p class="text-sm text-gray-500">${escapeJsStringForHtmlAttribute(user.email)}</p>
                                    <p class="text-sm font-semibold mt-1">Balance: <span class="text-green-600">${formatCurrency(user.wallet_balance || 0)}</span></p>
                                    <p class="text-xs font-semibold ${lockStatusColor}">${lockStatusText}</p>
                                    <p class="text-xs text-gray-400">Signed Up: ${createdAtDate}</p>
                                </div>
                                <button onclick="openEditUserModal(
                                    '${escapeJsStringForHtmlAttribute(user.uid)}', 
                                    '${escapeJsStringForHtmlAttribute(user.username)}', 
                                    '${escapeJsStringForHtmlAttribute(user.email)}', 
                                    ${user.wallet_balance || 0}, 
                                    ${user.locked || false}, 
                                    \`${escapeJsStringForHtmlAttribute(user.lockReason || '')}\`
                                )" class="bg-blue-500 text-white px-3 py-1 rounded text-sm font-semibold shadow">Edit</button>
                            </div>
                        `;
                        userCount++;
                    }
                } else {
                    console.warn(`Admin Panel: Skipping user with UID '${user.uid}' due to incomplete data:`, user);
                }
            }

            if (userCount > 0) {
                listEl.innerHTML = usersHtml;
                console.log(`Admin Panel: Displaying ${userCount} filtered users.`);
            } else {
                listEl.innerHTML = `<p class="text-center text-gray-400 italic">No users found matching "${searchTerm}".</p>`;
                console.log(`Admin Panel: No users matched search term "${searchTerm}".`);
            }
        }

        async function updateUserProfile(e) {
            e.preventDefault();
            const uid = document.getElementById('edit-user-uid').value;
            const newUsername = document.getElementById('edit-user-username').value.trim();
            const balanceAdjustment = Number(document.getElementById('edit-user-balance-adjust').value);
            const balanceReason = document.getElementById('edit-user-balance-reason').value.trim();
            const isLocked = document.getElementById('edit-user-locked-status').checked;
            const lockReason = document.getElementById('edit-user-lock-reason').value.trim();

            if (!newUsername) {
                showToast('Username cannot be empty!', true);
                return;
            }

            if (isLocked && !lockReason) {
                showToast('Lock reason is required when locking an account!', true);
                return;
            }

            try {
                const userRef = db.ref(`users/${uid}`);
                const previousUserData = (await userRef.once('value')).val();
                const previousLockedStatus = previousUserData?.locked || false;

                const updates = { username: newUsername };

                if (isLocked !== previousLockedStatus) {
                    updates.locked = isLocked;
                    updates.lockReason = isLocked ? lockReason : null; 

                    const notificationMessage = isLocked
                        ? `Your account has been locked by an administrator. Reason: ${lockReason || 'No reason provided.'}`
                        : `Your account has been unlocked by an administrator.`;
                    
                    await db.ref(`notifications/${uid}`).push({
                        title: isLocked ? 'Account Locked' : 'Account Unlocked',
                        message: notificationMessage,
                        timestamp: new Date().toISOString(),
                        status: 'unread',
                        type: isLocked ? 'account_locked' : 'account_unlocked'
                    });
                } else if (isLocked && lockReason !== (previousUserData?.lockReason || '')) {
                     updates.lockReason = lockReason;
                     await db.ref(`notifications/${uid}`).push({
                        title: 'Account Lock Reason Updated',
                        message: `Your account lock reason has been updated by an administrator. New reason: ${lockReason || 'No reason provided.'}`,
                        timestamp: new Date().toISOString(),
                        status: 'unread',
                        type: 'account_lock_reason_update'
                    });
                }
                
                if (balanceAdjustment !== 0) {
                    if (!balanceReason) {
                        showToast('Reason for balance adjustment is required!', true);
                        return;
                    }

                    await userRef.child('wallet_balance').transaction((currentBalance) => {
                        const balanceBefore = currentBalance || 0;
                        const newBalance = balanceBefore + balanceAdjustment;
                        return newBalance;
                    }, async (error, committed, snapshot) => {
                        if (error) {
                            showToast('Balance update failed: ' + error.message, true);
                        } else if (committed) {
                            await db.ref(`transactions/${uid}`).push({
                                amount: Math.abs(balanceAdjustment),
                                type: balanceAdjustment > 0 ? 'credit' : 'debit',
                                description: `Admin adjustment: ${balanceReason}`,
                                created_at: new Date().toISOString(),
                                admin_uid: currentAdminData.uid
                            });
                            showToast('User profile and balance updated!');
                        }
                    });
                }
                
                await userRef.update(updates);
                showToast('User profile updated!');

                toggleModal('editUserModal', false);
            } catch (error) {
                console.error("Error updating user:", error);
                showToast('Failed to update user. ' + error.message, true);
            }
        }

        async function declareWinner(e) {
            e.preventDefault();
            const winnerId = document.getElementById('winner-select').value;
            if (!winnerId) return showToast('Select a winner!', true);
            const tournament = (await db.ref(`tournaments/${currentTournamentId}`).once('value')).val();
            const winner = (await db.ref(`users/${winnerId}`).once('value')).val();
            const newBalance = (winner.wallet_balance || 0) + tournament.prize_pool;
            const updates = {
                [`/tournaments/${currentTournamentId}/status`]: 'Completed', [`/tournaments/${currentTournamentId}/winner_id`]: winnerId,
                [`/participants/${currentTournamentId}/${winnerId}/status`]: 'Winner', [`/users/${winnerId}/wallet_balance`]: newBalance,
                [`/transactions/${winnerId}/${db.ref().child('transactions').push().key}`]: {
                    amount: tournament.prize_pool, type: 'credit', description: `Won: ${tournament.title}`, created_at: new Date().toISOString()
                }
            };
            await db.ref().update(updates);
            showToast('Winner declared!');
            renderAdminManageTournamentPage(document.getElementById('adminManageTournamentPage'));
        }

        // NEW PAGE: Admin Worker Earnings Page (CRUD)
        async function renderAdminWorkerEarningsPage(container) {
            container.innerHTML = `
                <div class="p-4 bg-orange-50 min-h-screen">
                    <div class="flex items-center gap-4 mb-4">
                        <button onclick="navigateTo('adminSettingsPage')" class="text-gray-500"><i class="fas fa-arrow-left fa-lg"></i></button>
                        <h2 class="text-2xl font-black text-gray-800">Manage Worker Earnings</h2>
                    </div>
                    
                    <div class="bg-white p-4 rounded-xl shadow-md border border-orange-100 mb-6">
                        <h3 class="font-bold text-lg mb-3 text-red-600">Add New Earning Request</h3>
                        <form id="addEarningRequestForm" class="space-y-3">
                            <label class="block"><span class="text-gray-700 text-sm">User Email/Username:</span>
                                <input type="text" id="earning-user-identifier" placeholder="Enter user's email or username" class="w-full p-2 bg-gray-50 rounded border border-gray-200" required>
                            </label>
                            <label class="block"><span class="text-gray-700 text-sm">Amount (PKR):</span>
                                <input type="number" id="earning-amount" placeholder="e.g., 50" class="w-full p-2 bg-gray-50 rounded border border-gray-200" required>
                            </label>
                            <label class="block"><span class="text-gray-700 text-sm">Description:</span>
                                <input type="text" id="earning-description" placeholder="e.g., Ad Watch Bonus" class="w-full p-2 bg-gray-50 rounded border border-gray-200" required>
                            </label>
                            <button type="submit" class="w-full text-white bg-gradient-to-r from-red-600 to-yellow-500 p-2 rounded-lg font-bold">Add Request</button>
                        </form>
                    </div>

                    <h3 class="font-bold text-lg text-gray-700">All Worker Earnings</h3>
                    <div id="worker-earnings-list" class="space-y-3">
                        <p class="text-center text-gray-400 italic">Loading earnings...</p>
                    </div>
                </div>
            `;
            const listEl = document.getElementById('worker-earnings-list');
            db.ref('worker_earnings').on('value', async snap => {
                const earnings = snap.val();
                if (!earnings) { listEl.innerHTML = `<p class="text-center text-gray-400 italic">No worker earnings found.</p>`; return; }
                let earningsHtml = '';
                const earningsArray = [];
                // Fetch all user data once for efficiency
                const allUsersSnap = await db.ref('users').once('value');
                const allUsers = allUsersSnap.val() || {};

                for (const id in earnings) {
                    const earning = earnings[id];
                    let username = 'N/A';
                    let email = 'N/A';
                    if (earning.userId && allUsers[earning.userId]) {
                        username = allUsers[earning.userId].username || 'N/A';
                        email = allUsers[earning.userId].email || 'N/A';
                    }
                    earningsArray.push({ id, username, email, ...earning });
                }
                earningsArray.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)); // Sort newest first

                earningsArray.forEach(earning => {
                    const statusClass = earning.status === 'pending' ? 'bg-yellow-100 text-yellow-800' : (earning.status === 'approved' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800');
                    earningsHtml += `
                        <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-100 flex items-center justify-between">
                            <div>
                                <p class="font-bold text-gray-800">${escapeJsStringForHtmlAttribute(earning.description)} - ${formatCurrency(earning.amount)}</p>
                                <p class="text-sm text-gray-600">User: ${escapeJsStringForHtmlAttribute(earning.username)} (${escapeJsStringForHtmlAttribute(earning.email)})</p>
                                <span class="text-xs font-semibold px-2 py-0.5 rounded-full ${statusClass}">${earning.status.toUpperCase()}</span>
                                <p class="text-xs text-gray-500 mt-1">${new Date(earning.created_at).toLocaleString()}</p>
                            </div>
                            <div class="flex flex-col gap-2">
                                ${earning.status === 'pending' ? `
                                <button onclick="approveWorkerEarning('${escapeJsStringForHtmlAttribute(earning.id)}', '${escapeJsStringForHtmlAttribute(earning.userId)}', ${earning.amount})" class="bg-green-500 text-white px-3 py-1 rounded text-sm font-semibold">Approve</button>
                                <button onclick="rejectWorkerEarning('${escapeJsStringForHtmlAttribute(earning.id)}')" class="bg-red-500 text-white px-3 py-1 rounded text-sm font-semibold">Reject</button>
                                ` : ''}
                            </div>
                        </div>
                    `;
                });
                listEl.innerHTML = earningsHtml;
            });
            document.getElementById('addEarningRequestForm').addEventListener('submit', addWorkerEarningRequest);
        }

        async function addWorkerEarningRequest(e) {
            e.preventDefault();
            const userIdentifier = document.getElementById('earning-user-identifier').value.trim();
            const amount = Number(document.getElementById('earning-amount').value);
            const description = document.getElementById('earning-description').value.trim();

            if (!userIdentifier || amount <= 0 || !description) {
                showToast('All fields are required and amount must be positive!', true);
                return;
            }

            let userId = null;
            // First, try to find by email
            const usersSnapByEmail = await db.ref('users').orderByChild('email').equalTo(userIdentifier).once('value');
            if (usersSnapByEmail.exists()) {
                userId = Object.keys(usersSnapByEmail.val())[0];
            } else {
                // If not by email, try by username
                const usernameSnap = await db.ref('usernames/' + userIdentifier.toLowerCase()).once('value');
                if (usernameSnap.exists()) {
                    userId = usernameSnap.val();
                }
            }

            if (!userId) {
                showToast('User not found by email or username!', true);
                return;
            }
            
            const newEarningRequest = {
                userId: userId,
                amount: amount,
                description: description,
                status: 'pending',
                created_at: new Date().toISOString(),
                admin_uid: currentAdminData.uid
            };

            try {
                await db.ref('worker_earnings').push(newEarningRequest);
                showToast('Earning request added successfully!');
                e.target.reset();
            } catch (error) {
                console.error("Error adding earning request:", error);
                showToast('Failed to add earning request. ' + error.message, true);
            }
        }

        async function approveWorkerEarning(earningId, userId, amount) {
            if (confirm(`Approve this earning of ${formatCurrency(amount)} for the user? This will add funds to their wallet.`)) {
                const userWalletRef = db.ref(`users/${userId}/wallet_balance`);
                userWalletRef.transaction((currentBalance) => {
                    return (currentBalance || 0) + amount;
                }, async (error, committed, snapshot) => {
                    if (error) {
                        showToast('Earning approval failed: ' + error.message, true);
                    } else if (committed) {
                        await db.ref(`worker_earnings/${earningId}`).update({ status: 'approved', approved_at: new Date().toISOString() });
                        await db.ref(`transactions/${userId}`).push({
                            amount: amount,
                            type: 'credit',
                            description: 'Worker Earning Approved',
                            created_at: new Date().toISOString(),
                            admin_uid: currentAdminData.uid
                        });
                        showToast('Worker earning approved and wallet updated!');
                    }
                });
            }
        }

        async function rejectWorkerEarning(earningId) {
            if (confirm('Are you sure you want to reject this earning request?')) {
                try {
                    await db.ref(`worker_earnings/${earningId}`).update({ status: 'rejected', rejected_at: new Date().toISOString() });
                    showToast('Worker earning request rejected!');
                } catch (error) {
                    console.error("Error rejecting earning request:", error);
                    showToast('Failed to reject earning request. ' + error.message, true);
                }
            }
        }


    </script>
